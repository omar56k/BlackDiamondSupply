<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="color-scheme" content="light only">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Store Photos | Black Diamond Auto Supply</title>
  <link href="https://fonts.googleapis.com/css2?family=Cabin+Sketch:wght@400;700&family=Special+Elite&family=Permanent+Marker&display=swap" rel="stylesheet">
  <style>
    
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --offwhite:#f4f2ee;--offwhite2:#eae7e0;--stone:#ccc8c0;
      --slate:#8a8e96;--charcoal:#1a1917;--accent:#6b7fa3;
      --accent2:#a8b4c8;--white:#fff;
    }
    html{scroll-behavior:smooth;}
    body{background:var(--offwhite);color:var(--charcoal);font-family:'Special Elite',cursive;overflow-x:hidden;}
    nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:60px;background:var(--offwhite);border-bottom:1.5px solid var(--stone);}
    .nav-back{font-family:'Cabin Sketch',cursive;font-weight:700;font-size:0.8rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--slate);text-decoration:none;transition:color 0.2s;}
    .nav-back:hover{color:var(--charcoal);}
    .nav-logo img{height:36px;width:auto;}
    .nav-cta{font-family:'Cabin Sketch',cursive;font-weight:700;font-size:0.78rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--offwhite);background:var(--charcoal);padding:7px 16px;text-decoration:none;transition:background 0.2s;}
    .nav-cta:hover{background:var(--accent);}
    .page-header{padding:40px 24px 28px;background:var(--charcoal);position:relative;overflow:hidden;}
    .page-header::before{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(-55deg,transparent,transparent 40px,rgba(255,255,255,0.015) 40px,rgba(255,255,255,0.015) 41px);pointer-events:none;}
    .page-header-label{font-family:'Special Elite',cursive;font-size:0.63rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;position:relative;z-index:1;}
    .page-header-title{font-family:'Permanent Marker',cursive;font-size:clamp(2rem,6vw,3rem);color:var(--offwhite);line-height:1;position:relative;z-index:1;}
    .page-content{padding:36px 24px 72px;}
    .section-label{font-family:'Special Elite',cursive;font-size:0.63rem;letter-spacing:0.28em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;}
    .section-title{font-family:'Permanent Marker',cursive;font-size:clamp(1.6rem,4vw,2.4rem);color:var(--charcoal);line-height:1.1;margin-bottom:12px;}
    .section-sub{font-family:'Special Elite',cursive;font-size:0.88rem;color:var(--slate);line-height:1.75;margin-bottom:32px;}

    .photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px;background:var(--charcoal);}
    .photo{overflow:hidden;position:relative;aspect-ratio:1;}
    .photo.wide{grid-column:1/-1;aspect-ratio:16/9;}
    .photo img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.4s;}
    .photo:hover img{transform:scale(1.03);}
    .photo-caption{position:absolute;bottom:0;left:0;right:0;padding:10px 14px;background:linear-gradient(transparent,rgba(26,25,23,0.78));font-family:'Special Elite',cursive;font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;color:rgba(244,242,238,0.9);}
  </style>
